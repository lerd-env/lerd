user root;
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 0;

    # Allow long server_name values: a worktree vhost emits
    # "<branch>.<site>.test *.<branch>.<site>.test", which can exceed nginx's
    # default server_names_hash_bucket_size (64) for long branch names and
    # crash nginx for every site. Bump the bucket/max so they always fit.
    server_names_hash_max_size 1024;
    server_names_hash_bucket_size 256;

    # Use Podman network DNS so upstream hostnames are re-resolved dynamically
    resolver {{.Resolver}} valid=5s ipv6=off;

    # Activity + timing feed for idle-suspend and request stats: a pipe-delimited
    # record shipped to the watcher (unix socket on Linux, host.containers.internal
    # UDP on macOS). It's an http-level default every vhost inherits; a dropped
    # datagram is harmless (grace covers). Host stays the first field so the idle
    # parser still reads it; the rest feeds per-route timing.
    log_format lerd_access '$host|$status|$request_time|$request_method|$request_uri';
    access_log syslog:server={{.AccessLogTarget}},nohostname,tag=lerdaccess lerd_access;

    # User http-level overrides (gzip, proxy buffers, client_max_body_size…).
    # Lerd never writes here. A default above that the override also declares
    # is commented out on render; nginx rejects duplicates instead of merging.
    include /etc/nginx/http.d/*.conf;

    include /etc/nginx/conf.d/*.conf;
}

; lerd: devtools collector — engine-level capture for the debug window.
; Read by the lerd_devtools Zend extension. Capture shares one sentinel with
; the debug bridge (enabled.flag), so a single toggle arms both (no FPM
; restart). Do not edit manually.
lerd.devtools_host={{ DEVTOOLS_TARGET }}
lerd.devtools_kinds={{ DEVTOOLS_KINDS }}
lerd.devtools_flag=/usr/local/etc/lerd/enabled.flag
